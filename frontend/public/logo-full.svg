<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150">
  <defs>
    <linearGradient id="gradTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21859c" />
      <stop offset="50%" stop-color="#2ea89c" />
      <stop offset="100%" stop-color="#3ccb9c" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 85)">
    <!-- Insure -->
    <text x="0" y="0" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="96" fill="#112c55" letter-spacing="-2.5">Insure</text>
    
    <!-- Custom R -->
    <g transform="translate(325, -72)">
      <!-- Left Stem and Arch -->
      <path d="M 0,72 L 0,0 C 30,0 40,5 50,15 L 32,32 C 25,25 20,22 18,22 L 18,72 Z" fill="url(#gradTeal)" />
      
      <!-- Arrow Head -->
      <polygon points="35,5 70,22 35,39" fill="url(#gradTeal)" />
      
      <!-- Right Leg -->
      <path d="M 18,35 L 55,72 L 25,72 L 0,45 Z" fill="url(#gradTeal)" />
    </g>
    
    <!-- oute -->
    <text x="400" y="0" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="96" fill="url(#gradTeal)" letter-spacing="-2.5">oute</text>
  </g>

  <!-- Tagline -->
  <text x="12" y="130" font-family="'Montserrat', 'Inter', 'Segoe UI', sans-serif" font-weight="400" font-size="28" fill="#334155" letter-spacing="0">Smart Supply Chain Intelligence &amp; Dynamic Pricing</text>
</svg>