<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5a8e"/>
      <stop offset="50%" stop-color="#389e9f"/>
      <stop offset="100%" stop-color="#49cdad"/>
    </linearGradient>
    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14426b"/>
      <stop offset="50%" stop-color="#2a7778"/>
      <stop offset="100%" stop-color="#379b82"/>
    </linearGradient>
    <linearGradient id="bgGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2372b3"/>
      <stop offset="50%" stop-color="#46c5c6"/>
      <stop offset="100%" stop-color="#5bfcd7"/>
    </linearGradient>
  </defs>

  <!-- Outer Shield/Circle Base -->
  <path d="M150,15 
           A135,135 0 0,0 15,150 
           A135,135 0 0,0 60,250
           L150,285
           L240,250
           A135,135 0 0,0 285,150
           A135,135 0 0,0 150,15 Z" 
        fill="url(#bgGrad)" stroke="#14426b" stroke-width="12" />

  <!-- Inner cut-out for ring effect -->
  <path d="M150,45 
           A105,105 0 0,0 45,150 
           A105,105 0 0,0 80,225
           L150,250
           L220,225
           A105,105 0 0,0 255,150
           A105,105 0 0,0 150,45 Z" 
        fill="#ffffff" />
        
  <!-- Background behind the net (white for clean look) -->
  <circle cx="150" cy="150" r="105" fill="#ffffff" />

  <!-- Network / Nodes (Supply Chain Connections) -->
  <g stroke="#1b5a8e" stroke-width="3" fill="none">
    <!-- Lines -->
    <path d="M 60,110 L 110,90" />
    <path d="M 110,90 L 150,50" />
    <path d="M 110,90 L 100,160" />
    <path d="M 60,110 L 100,160" />
    <path d="M 100,160 L 60,200" />
    <path d="M 100,160 L 140,220" />
    <path d="M 60,200 L 140,220" />
    <path d="M 150,50 L 210,80" />
    <path d="M 110,90 L 210,80" />
    <path d="M 210,80 L 250,140" />
    <path d="M 210,80 L 180,160" />
    <path d="M 250,140 L 180,160" />
    <path d="M 250,140 L 220,210" />
    <path d="M 180,160 L 220,210" />
    <path d="M 140,220 L 220,210" />
    <path d="M 180,160 L 140,220" />
  </g>

  <!-- Node Dots -->
  <g fill="#1b5a8e">
    <circle cx="60" cy="110" r="6" />
    <circle cx="150" cy="50" r="6" />
    <circle cx="100" cy="160" r="6" />
    <circle cx="60" cy="200" r="6" />
    <circle cx="140" cy="220" r="6" />
    <circle cx="210" cy="80" r="6" />
    <circle cx="250" cy="140" r="6" />
    <circle cx="180" cy="160" r="6" />
    <circle cx="220" cy="210" r="6" />
    <!-- Hexagon node at 110,90 -->
    <polygon points="110,82 117,86 117,94 110,98 103,94 103,86" />
  </g>

  <!-- Route Path (Thick glowing line) -->
  <g>
    <!-- Glow effect -->
    <path d="M 40,250 C 90,250 100,200 130,200 C 180,200 180,120 220,100 C 250,85 270,40 270,40" 
          fill="none" stroke="#5bfcd7" stroke-width="18" stroke-linecap="round" opacity="0.4" />
    <!-- Core line -->
    <path d="M 40,250 C 90,250 100,200 130,200 C 180,200 180,120 220,100 C 250,85 270,40 270,40" 
          fill="none" stroke="url(#bgGradLight)" stroke-width="10" stroke-linecap="round" />
  </g>

  <!-- Start and End Hexagons -->
  <!-- Bottom Left Hexagon -->
  <g transform="translate(40, 250)">
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#1b5a8e" stroke-width="4" />
    <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4" fill="#ffffff" />
  </g>

  <!-- Top Right Hexagon -->
  <g transform="translate(270, 40)">
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#389e9f" stroke-width="4" />
    <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4" fill="#ffffff" />
  </g>

  <!-- Center Lightning Bolt (Danger/Disruption indicator) -->
  <g transform="translate(150, 150) scale(1.2)">
    <path d="M -5,-25 L -20,5 L -5,5 L -10,25 L 20,-5 L 5,-5 Z" 
          fill="none" stroke="#e64a33" stroke-width="6" stroke-linejoin="round" stroke-miterlimit="round"/>
  </g>
</svg>